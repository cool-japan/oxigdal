# OxiGDAL Kubernetes Secrets Template
# IMPORTANT: Do not commit actual secrets to git!
# Use sealed-secrets, external-secrets, or vault for production
# Author: COOLJAPAN OU (Team Kitasan)

apiVersion: v1
kind: Secret
metadata:
  name: oxigdal-secrets
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # PostgreSQL credentials
  postgres-db: oxigdal
  postgres-user: oxigdal
  postgres-password: CHANGEME  # Replace with secure password

  # Redis password (if authentication is enabled)
  redis-password: ""  # Empty for no auth

  # S3 credentials (if using S3 storage)
  aws-access-key-id: ""
  aws-secret-access-key: ""
  aws-region: us-east-1

  # Azure credentials (if using Azure storage)
  azure-storage-account: ""
  azure-storage-key: ""

  # GCS credentials (if using GCS storage)
  gcs-project-id: ""
  gcs-service-account-key: ""

  # API keys for external services
  api-key: ""
  jwt-secret: ""

---
