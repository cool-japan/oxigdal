# OxiGDAL Kubernetes ConfigMap
# Configuration management for OxiGDAL services
# Author: COOLJAPAN OU (Team Kitasan)

apiVersion: v1
kind: ConfigMap
metadata:
  name: oxigdal-config
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: config
data:
  # Server configuration
  server.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080
    workers = 4

    [cache]
    enabled = true
    size_mb = 1024
    ttl_seconds = 3600

    [tile]
    max_age = 3600
    formats = ["png", "jpeg", "webp"]
    default_format = "png"

    [cors]
    enabled = true
    allowed_origins = ["*"]
    allowed_methods = ["GET", "HEAD", "OPTIONS"]

    [logging]
    level = "info"
    format = "json"

  # Environment configuration
  RUST_LOG: "info"
  RUST_BACKTRACE: "1"
  OXIGDAL_DATA_DIR: "/data"
  OXIGDAL_CACHE_DIR: "/cache"
  OXIGDAL_HOST: "0.0.0.0"
  OXIGDAL_PORT: "8080"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: proxy
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss
                   application/rss+xml application/atom+xml image/svg+xml;

        upstream oxigdal_backend {
            least_conn;
            server oxigdal-server:8080 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        server {
            listen 80;
            server_name _;

            location / {
                proxy_pass http://oxigdal_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_buffering off;
                proxy_request_buffering off;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location /health {
                proxy_pass http://oxigdal_backend/health;
                access_log off;
            }

            location /metrics {
                proxy_pass http://oxigdal_backend:8081/metrics;
                access_log off;
            }
        }
    }
