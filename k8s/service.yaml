# OxiGDAL Kubernetes Services
# Service definitions for OxiGDAL components
# Author: COOLJAPAN OU (Team Kitasan)

apiVersion: v1
kind: Service
metadata:
  name: oxigdal-server
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: server
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: oxigdal-server-headless
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: server
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: oxigdal-server-lb
  namespace: oxigdal
  labels:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: server
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: oxigdal
    app.kubernetes.io/component: server
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  externalTrafficPolicy: Local
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
