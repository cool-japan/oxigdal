[workspace.package]
version = "0.1.2"
edition = "2024"
rust-version = "1.85"
authors = ["COOLJAPAN OU (Team Kitasan)"]
license = "Apache-2.0"
repository = "https://github.com/cool-japan/oxigdal"
homepage = "https://github.com/cool-japan/oxigdal"
documentation = "https://docs.rs/oxigdal"
readme = "README.md"

[workspace.dependencies]
# Core dependencies
thiserror = { version = "2", default-features = false }
serde = { version = "1", default-features = false, features = ["derive", "alloc"] }
serde_json = "1"
bytes = { version = "1", features = ["serde"] }
byteorder = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
time = { version = "0.3.47", default-features = false, features = ["formatting", "parsing", "macros"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"
async-trait = "0.1"
async-stream = "0.3"

# Arrow ecosystem
arrow = { version = "58", default-features = false }
arrow-array = "58"
arrow-buffer = "58"
arrow-schema = "58"
parquet = { version = "58", default-features = false }

# Compression - COOLJAPAN Pure Rust Policy (oxiarc ecosystem)
# Use oxiarc-* crates instead of C-based compression libraries
oxiarc-archive = "0.2.4"  # ZIP, TAR, GZIP, LZH, XZ archive formats
oxiarc-core = "0.2.4"     # Core components for OxiArc
oxiarc-deflate = "0.2.4"  # Pure Rust DEFLATE (replacement for flate2)
oxiarc-lzw = "0.2.4"      # Pure Rust LZW compression (updated from 0.2.2)
oxiarc-lz4 = "0.2.4"      # Pure Rust LZ4 compression
oxiarc-zstd = "0.2.4"     # Pure Rust Zstandard compression
oxiarc-bzip2 = "0.2.4"    # Pure Rust BZip2 compression
oxiarc-lzhuf = "0.2.4"    # Pure Rust LZH compression

# Legacy compression crates (to be phased out, kept for compatibility)
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
zstd = { version = "0.13", default-features = false }
brotli = "8"
snap = "1"
jpeg-decoder = "0.3"
jpeg-encoder = "0.7"

# Serialization formats
apache-avro = { version = "0.21", default-features = false }
flatbuffers = "25"
rmp-serde = "1.3"
toml = "1.0"

# HTTP client
reqwest = { version = "0.13", default-features = false, features = ["rustls", "blocking", "json"] }

# Storage backend
rs3gw = "0.2"

# WASM support
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wasm-bindgen-test = "0.3"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "console",
    "CanvasRenderingContext2d",
    "HtmlCanvasElement",
    "ImageData",
    "Response",
    "Headers",
    "RequestInit",
    "Request",
    "RequestMode",
    "Worker",
    "MessageEvent",
    "DedicatedWorkerGlobalScope",
    "WorkerGlobalScope",
    "WorkerOptions",
    "WorkerType",
    "Blob",
    "BlobPropertyBag",
    "Url",
    # IndexedDB features
    "IdbDatabase",
    "IdbObjectStore",
    "IdbRequest",
    "IdbTransaction",
    "IdbFactory",
    "IdbOpenDbRequest",
    "IdbVersionChangeEvent",
    "IdbCursorWithValue",
    "IdbKeyRange",
    "IdbIndex",
    "IdbTransactionMode",
    "IdbRequestReadyState",
    "DomException",
    "Event",
    "EventTarget",
] }

# COOLJAPAN ecosystem
scirs2-core = "0.3.3"
# numrs2 = { version = "0.1", optional = true }
# oxiblas = { version = "0.1", optional = true }
oxicode = "0.2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
proptest = "1"
tokio-test = "0.4"

# Benchmarking
criterion = { version = "0.8", features = ["html_reports"] }
pprof = { version = "0.15", default-features = false, features = ["flamegraph", "prost-codec"] }

# Additional dependencies
num-traits = "0.2"
once_cell = "1"
approx = "0.5"
rayon = "1"
lz4 = "1"
lru = "0.16.3"
tempfile = "3"
quick-xml = "0.39"
bytemuck = "1"
dashmap = "6"
sysinfo = "0.38"
tinytemplate = "1"

# Cloud storage
aws-sdk-s3 = "1"
aws-config = "1"

# Messaging
rdkafka = { version = "0.39", default-features = false, features = ["tokio"] }
rumqttc = { version = "0.25", default-features = false }
# NOTE: sled 0.34.7 has unmaintained deps (RUSTSEC-2025-0057 fxhash, RUSTSEC-2024-0384 instant)
# Low risk: optional features, stable code. Consider redb for future major version.
sled = "0.34"

# Database - SQLite (constrained by proj-sys requirement: >=0.28, <0.36)
rusqlite = "0.34"  # Compatible with libsqlite3-sys 0.32
libsqlite3-sys = "0.32"  # Must be >=0.28, <0.36 for proj-sys compatibility

# Scheduling
cron = "0.15"

# Pattern matching
regex = "1"

# Random number generation
fastrand = "2"

# WASM utilities
console_error_panic_hook = "0.1"
serde-wasm-bindgen = "0.6"

# Internal crates - core
oxigdal-core = { path = "crates/oxigdal-core", version = "0.1" }
oxigdal-algorithms = { path = "crates/oxigdal-algorithms", version = "0.1" }
oxigdal-proj = { path = "crates/oxigdal-proj", version = "0.1" }
oxigdal-qc = { path = "crates/oxigdal-qc", version = "0.1" }

# Driver crates
oxigdal-geotiff = { path = "crates/oxigdal-drivers/geotiff", version = "0.1" }
oxigdal-geojson = { path = "crates/oxigdal-drivers/geojson", version = "0.1" }
oxigdal-zarr = { path = "crates/oxigdal-drivers/zarr", version = "0.1" }
oxigdal-flatgeobuf = { path = "crates/oxigdal-drivers/flatgeobuf", version = "0.1" }
oxigdal-shapefile = { path = "crates/oxigdal-drivers/shapefile", version = "0.1" }
oxigdal-netcdf = { path = "crates/oxigdal-drivers/netcdf", version = "0.1" }
oxigdal-geoparquet = { path = "crates/oxigdal-drivers/geoparquet", version = "0.1" }
