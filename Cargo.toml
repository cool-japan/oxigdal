# Node.js bindings dependencies
napi = "3"
napi-derive = "3"
napi-build = "2"

# Embedded-specific dependencies
critical-section = "1"
portable-atomic = "1"
heapless = "0.9"
embedded-hal = "1"
libm = "0.2"

# Hostname
hostname = "0.4"

# URL and GeoJSON support
url = { version = "2", features = ["serde"] }
geojson = "1.0"
geo-types = "0.7"
geo = "0.32"
uuid = { version = "1", features = ["v4", "serde"] }

# Web framework dependencies (for oxigdal-server)
axum = "0.8"
tower = { version = "0.5", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.6", features = ["fs", "trace", "cors", "compression-full"] }
hyper = { version = "1", features = ["full"] }
http = "1"
http-body-util = "0.1"

# Image processing
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
png = "0.18"

# CLI and config
anyhow = "1"
clap = { version = "4", features = ["derive", "env", "cargo"] }

# GPU compute
encase = "0.12"
glam = { version = "0.32", features = ["bytemuck"] }
naga = { version = "28", features = ["wgsl-in", "wgsl-out"] }
pollster = "0.4"
wgpu = { version = "28", default-features = false, features = ["wgsl", "metal"] }

# 3D/Point cloud
gltf = { version = "1", features = ["import"] }
gltf-json = "1"
delaunator = "1"
rstar = "0.12"
las = "0.9"
laz = { version = "0.12", default-features = false }
base64 = "0.22"

# Crypto (for optional features)
getrandom = "0.4"
hmac = "0.12"
sha2 = "0.10"

# OAuth2
oauth2 = { version = "5", default-features = false }

# Cloud providers (Azure, GCS)
# Azure SDK kept at 0.21 (API stability, latest available for storage crates)
azure_storage = "0.21"
azure_storage_blobs = "0.21"
azure_storage_datalake = "0.21"
azure_core = "0.33"
azure_identity = "0.33"
# Google Cloud SDK - using latest stable versions (reduces tonic/axum duplication)
google-cloud-storage = "1"  # Upgraded from 0.22
google-cloud-auth = "1"     # Upgraded from 0.18
google-cloud-bigquery = "0.15"
google-cloud-pubsub = "0.33"  # Upgraded from 0.29 to use latest tonic/axum

# AWS extended SDK
aws-sdk-athena = "1"
aws-smithy-types = { version = "1", features = ["byte-stream-poll-next"] }
aws-sdk-glue = "1"
aws-sdk-lambda = "1"
aws-sdk-sagemaker = "1"
aws-sdk-cloudwatch = "1"
aws-sdk-costexplorer = "1"

# Scientific computing
# scirs2-core already defined above in COOLJAPAN ecosystem section
ort = { version = "=2.0.0-rc.11", default-features = false, features = ["half", "ndarray", "load-dynamic"] }
ndarray = "0.17"

# SciRS2 AI/ML subcrates - Pure Rust (COOLJAPAN compliant)
scirs2-neural = "0.3.3"
scirs2-autograd = "0.3.3"
scirs2-optimize = "0.3.3"
scirs2-datasets = "0.3.3"
scirs2-metrics = "0.3.3"
scirs2-linalg = "0.3.3"
scirs2-vision = "0.3.3"
scirs2-series = "0.3.3"

# PostgreSQL
tokio-postgres = "0.7"
postgres-types = "0.2"
deadpool-postgres = "0.14"
tokio-postgres-rustls = "0.13"

# Distributed computing
arrow-flight = "58"
tonic = "0.14"
prost = "0.14"
parking_lot = "0.12"
crossbeam = "0.8"
crossbeam-channel = "0.5"
crossbeam-utils = "0.8"
blake3 = "1"
mimalloc = "0.1"
libc = "0.2"
ahash = { version = "0.8", features = ["serde"] }

# ML dependencies
aws-credential-types = "1"

# Gateway dependencies
async-graphql = "7"
async-graphql-axum = "7"
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
rustls = { version = "0.23", default-features = false }
rustls-pemfile = "2"  # RUSTSEC-2025-0134: Unmaintained (archived Aug 2025). Waiting for upstream (tonic, rumqttc) to migrate to rustls-pki-types 1.9+
tokio-tungstenite = "0.28"
redis = { version = "1", default-features = false, features = ["tokio-comp", "connection-manager"] }
governor = "0.10"

# Workflow dependencies
petgraph = "0.8"
num_cpus = "1"

# Jupyter and dev tools dependencies
jupyter = "0.2"
# NOTE: evcxr 0.18 uses json 0.12.4 (RUSTSEC-2022-0081: unmaintained). Low risk: dev tool only.
evcxr = "0.21"
plotters = "0.3"
plotters-backend = "0.3"
# indicatif 0.18 replaced number_prefix with unit-prefix (resolves RUSTSEC-2025-0119)
indicatif = "0.18"
console = "0.16"
comfy-table = "7"
colored = "3"
walkdir = "2"
notify = "8"
diff = "0.1"

[workspace.lints.rust]
unsafe_code = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
# High priority lints - must fix
unwrap_used = "deny"
panic = "deny"

# Medium priority lints
expect_used = "warn"
missing_errors_doc = "allow"  # Too verbose for now
missing_panics_doc = "allow"

# Allow common patterns in geospatial code
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
doc_markdown = "allow"  # Too pedantic for backticks
suboptimal_flops = "allow"  # FMA not always better for readability
manual_midpoint = "allow"  # Our implementation is clear
similar_names = "allow"  # x/y, width/height are standard
module_name_repetitions = "allow"  # Common in geospatial APIs
# SECURITY PATCH: mysql_async 0.36.1 uses lru 0.14.0 (RUSTSEC-2026-0002: unsound IterMut)
# PR #382 merged lru 0.16 upgrade but not yet released to crates.io
# Using git master (commit b2c4ed2b) which includes the fix
[patch.crates-io]
mysql_async = { git = "https://github.com/blackbeam/mysql_async.git", rev = "b2c4ed2b" }


[profile.release]
lto = true
codegen-units = 1
opt-level = 3

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.bench]
inherits = "release"
