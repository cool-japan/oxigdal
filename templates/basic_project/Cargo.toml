[package]
name = "my-oxigdal-project"
version = "0.1.0"
edition = "2024"
authors = ["Your Name <you@example.com>"]
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
oxigdal-core = "0.1"
oxigdal-algorithms = "0.1"
oxigdal-geotiff = "0.1"
oxigdal-geojson = "0.1"

# Error handling
anyhow = "1"
thiserror = "2"

# Async runtime (optional)
tokio = { version = "1", features = ["full"], optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
async = ["tokio"]
