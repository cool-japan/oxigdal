[package]
name = "my-oxigdal-server"
version = "0.1.0"
edition = "2024"

[dependencies]
oxigdal-core = "0.1"
oxigdal-server = "0.1"
oxigdal-geotiff = "0.1"

# Web framework
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "trace", "cors"] }
tokio = { version = "1", features = ["full"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
