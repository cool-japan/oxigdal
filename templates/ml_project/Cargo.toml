[package]
name = "my-oxigdal-ml-project"
version = "0.1.0"
edition = "2024"
authors = ["Your Name <you@example.com>"]

[dependencies]
oxigdal-core = "0.1"
oxigdal-algorithms = "0.1"
oxigdal-ml = "0.1"
oxigdal-geotiff = "0.1"

# ML dependencies
ort = { version = "2.0.0-rc.11", default-features = false, features = ["ndarray"] }
ndarray = "0.17"
scirs2-core = "0.1"

# Error handling
anyhow = "1"
thiserror = "2"

# Async
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tempfile = "3"
