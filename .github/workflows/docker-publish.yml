# OxiGDAL Docker Image Publishing Workflow
# Builds and publishes Docker images to GitHub Container Registry
# Author: COOLJAPAN OU (Team Kitasan)

name: Docker Publish

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - name: oxigdal-server
            dockerfile: docker/Dockerfile.server
            platforms: linux/amd64,linux/arm64
          - name: oxigdal-cli
            dockerfile: docker/Dockerfile.cli
            platforms: linux/amd64,linux/arm64
          - name: oxigdal-jupyter
            dockerfile: docker/Dockerfile.jupyter
            platforms: linux/amd64,linux/arm64
          - name: oxigdal-dev
            dockerfile: docker/Dockerfile.dev
            platforms: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.image.name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.image.name }}-
            ${{ runner.os }}-buildx-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Scan image for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/${{ matrix.image.name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image.name }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.image.name }}.sarif'
          category: ${{ matrix.image.name }}

  test-images:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - oxigdal-server
          - oxigdal-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test image
        run: |
          docker pull ${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ github.sha }}

          # Test server image
          if [ "${{ matrix.image }}" = "oxigdal-server" ]; then
            docker run -d --name test-server -p 8080:8080 \
              ${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ github.sha }}

            # Wait for server to start
            sleep 10

            # Test health endpoint
            curl -f http://localhost:8080/health || exit 1

            # Cleanup
            docker stop test-server
            docker rm test-server
          fi

          # Test CLI image
          if [ "${{ matrix.image }}" = "oxigdal-cli" ]; then
            docker run --rm ${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ github.sha }} --version
          fi

  publish-release:
    needs: test-images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            - Server: `${{ env.IMAGE_BASE }}/oxigdal-server:${{ github.ref_name }}`
            - CLI: `${{ env.IMAGE_BASE }}/oxigdal-cli:${{ github.ref_name }}`
            - Jupyter: `${{ env.IMAGE_BASE }}/oxigdal-jupyter:${{ github.ref_name }}`
            - Dev: `${{ env.IMAGE_BASE }}/oxigdal-dev:${{ github.ref_name }}`

            ## Quick Start

            ```bash
            # Run server
            docker run -p 8080:8080 ${{ env.IMAGE_BASE }}/oxigdal-server:${{ github.ref_name }}

            # Run CLI
            docker run ${{ env.IMAGE_BASE }}/oxigdal-cli:${{ github.ref_name }} --help
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
