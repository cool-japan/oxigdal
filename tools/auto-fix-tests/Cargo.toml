[package]
name = "auto-fix-tests"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]
# This is a standalone tool, not part of the main workspace

[dependencies]
syn = { version = "2.0", features = ["full", "visit-mut"] }
quote = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.5", features = ["derive"] }
prettyplease = "0.2"
walkdir = "2.5"
anyhow = "1.0"
chrono = "0.4"
