[package]
name = "oxigdal-pubsub"
description = "Google Cloud Pub/Sub integration for OxiGDAL - Pure Rust streaming and messaging"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-pubsub"
readme = "README.md"
keywords = ["pubsub", "messaging", "streaming", "network-programming", "google"]
categories = ["science", "network-programming", "asynchronous", "database"]

[features]
default = ["std", "async", "publisher", "subscriber", "pubsub-client"]
std = ["oxigdal-core/std", "thiserror/std", "serde/std"]
alloc = []

# Core features
async = ["oxigdal-core/async", "dep:tokio", "dep:async-trait", "dep:futures"]
publisher = ["async", "pubsub-client"]
subscriber = ["async", "pubsub-client"]
pubsub-client = ["dep:google-cloud-pubsub", "dep:google-cloud-googleapis"]

# Schema support
schema = ["dep:apache-avro", "dep:prost"]
avro = ["schema", "dep:apache-avro"]
protobuf = ["schema", "dep:prost", "dep:prost-types"]

# Monitoring
monitoring = ["async"]

# Advanced features
batching = ["async"]
ordering = ["async"]
flow-control = ["async"]
dead-letter = ["async"]

# Authentication
auth = []

[dependencies]
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
chrono = { workspace = true }

# Async runtime
tokio = { workspace = true, optional = true, features = ["io-util", "sync", "time", "rt"] }
async-trait = { workspace = true, optional = true }
futures = { workspace = true, optional = true }

# Google Cloud Pub/Sub - Pure Rust SDK
google-cloud-pubsub = { version = "0.29", optional = true }
google-cloud-googleapis = { version = "0.15", features = ["pubsub"], optional = true }
google-cloud-auth = { workspace = true }

# Schema support - Pure Rust
apache-avro = { version = "0.18", optional = true }
prost = { workspace = true, optional = true }
prost-types = { version = "0.13", optional = true }

# Error handling
anyhow = { workspace = true }

# Utilities
dashmap = { workspace = true }
parking_lot = { workspace = true }
uuid = { workspace = true }

# Metrics
num-traits = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }
tempfile = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true
