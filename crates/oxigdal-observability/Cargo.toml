[package]
name = "oxigdal-observability"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-observability"
readme = "README.md"
description = "OpenTelemetry-based observability, monitoring, and alerting for OxiGDAL"
keywords = ["observability", "opentelemetry", "monitoring", "metrics", "tracing"]
categories = ["development-tools::profiling", "network-programming", "science"]

[dependencies]
# OpenTelemetry core
opentelemetry = "0.31"
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
opentelemetry-stdout = { version = "0.31", features = ["trace", "metrics"] }
opentelemetry-otlp = { version = "0.31", optional = true, features = ["metrics", "trace", "grpc-tonic"] }
# opentelemetry-jaeger removed: RUSTSEC-2025-0123 (entire crate unmaintained, patched=[]).
# The `jaeger` feature falls through to stdout exporter (see traces.rs).
# Production Jaeger users should configure an OTLP endpoint with Jaeger's native OTLP support.

# Tracing integration
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-opentelemetry = "0.32"

# Metrics
prometheus = "0.14"

# Async runtime
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Time handling
chrono = { workspace = true }

# HTTP client for exporters
reqwest = { workspace = true, features = ["json"] }

# Statistics for anomaly detection
statrs = "0.18"

# Parking lot for better synchronization
parking_lot = { workspace = true }

# URL parsing
url = { workspace = true }

# UUID
uuid = { workspace = true }

# Fast random number generation
fastrand = { workspace = true }

# Hostname
hostname = { workspace = true }

[features]
default = ["otlp"]
# jaeger feature kept for API compatibility; opentelemetry-jaeger dep removed (RUSTSEC-2025-0123)
jaeger = []
otlp = ["opentelemetry-otlp"]

[dev-dependencies]
tokio-test.workspace = true
criterion = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "observability_bench"
harness = false

[lints]
workspace = true
