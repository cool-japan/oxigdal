[package]
name = "oxigdal-grib"
description = "GRIB1/GRIB2 meteorological data format driver for OxiGDAL - Pure Rust implementation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-grib"
readme = "README.md"
keywords = ["grib", "meteorology", "weather", "forecast", "gdal"]
categories = ["science", "parser-implementations", "encoding"]

[features]
default = ["std", "grib1", "grib2"]
std = ["oxigdal-core/std", "thiserror/std", "serde/std"]
alloc = []

# GRIB format version support
grib1 = []
grib2 = []

# Advanced features
# Simple packing (always enabled)
# Complex packing for data compression
complex_packing = []

# Async I/O
async = ["oxigdal-core/async", "dep:tokio"]

[dependencies]
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
byteorder = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
num-traits = { workspace = true }
chrono = { workspace = true }

# Async
tokio = { workspace = true, optional = true, features = ["io-util", "fs"] }

# Bit manipulation for packed data
bytemuck = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = { workspace = true }
approx = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }

[lints]
workspace = true
