[package]
name = "oxigdal-shapefile"
description = "Shapefile (ESRI) driver for OxiGDAL - Pure Rust GDAL reimplementation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-shapefile"
readme = "README.md"
keywords = ["shapefile", "gis", "vector", "esri", "gdal"]
categories = ["science", "parser-implementations", "encoding"]

[features]
default = ["std"]
std = ["oxigdal-core/std", "thiserror/std", "serde/std"]
async = ["oxigdal-core/async", "dep:tokio"]
arrow = ["oxigdal-core/arrow"]

[dependencies]
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
byteorder = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }

# Async
tokio = { workspace = true, optional = true, features = ["io-util", "fs"] }

[dev-dependencies]
proptest = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile = { workspace = true }

[lints]
workspace = true
