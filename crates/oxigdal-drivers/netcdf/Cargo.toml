[package]
name = "oxigdal-netcdf"
description = "NetCDF driver for OxiGDAL - Pure Rust NetCDF-3 with optional NetCDF-4 support"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-netcdf"
readme = "README.md"
keywords = ["netcdf", "scientific", "array", "climate", "gdal"]
categories = ["science", "parser-implementations", "encoding"]

[features]
default = ["std"]
std = ["oxigdal-core/std", "thiserror/std", "serde/std"]
alloc = []

# Pure Rust NetCDF-3 support (TEMPORARILY DISABLED - netcdf3 v0.6 API migration in progress)
# Re-enable after completing API migration in task #601
netcdf3 = ["dep:netcdf3"]

# NetCDF-4/HDF5 support via C bindings (feature-gated for Pure Rust policy)
# Warning: Requires system libnetcdf and libhdf5 libraries
# DISABLED by default for Pure Rust compliance - enable explicitly if needed
# netcdf4 = ["dep:netcdf"]

# CF conventions support
cf_conventions = []

# Compression support (for netcdf4 only) - disabled along with netcdf4
# compression = ["netcdf4"]

# Async I/O
async = ["oxigdal-core/async", "dep:tokio"]

[dependencies]
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
byteorder = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
num-traits = { workspace = true }

# Pure Rust NetCDF-3 implementation (now enabled with v0.6 API)
netcdf3 = { version = "0.6", optional = true }

# Pure Rust compression for NetCDF-4
oxiarc-deflate = { workspace = true }

# C-based NetCDF-4/HDF5 implementation (feature-gated, DISABLED for Pure Rust policy)
# netcdf = { version = "0.9", optional = true }

# Async
tokio = { workspace = true, optional = true, features = ["io-util", "fs"] }

# Date/time support for CF conventions
chrono = { version = "0.4", optional = true, features = ["serde"] }

[dev-dependencies]
proptest = { workspace = true }
tempfile = { workspace = true }
approx = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }

[lints]
workspace = true
