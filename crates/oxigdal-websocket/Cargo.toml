[package]
name = "oxigdal-websocket"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-websocket"
readme = "README.md"
description = "Advanced real-time WebSocket communication for OxiGDAL with broadcasting, pub/sub, and live updates"
keywords = ["websocket", "science", "real-time", "broadcast", "pubsub"]
categories = ["web-programming::websocket", "science", "network-programming", "asynchronous"]

[dependencies]
# Workspace dependencies
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
bytes = { workspace = true }
byteorder = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
dashmap = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

# WebSocket dependencies
tokio-tungstenite = { workspace = true }

# Compression
flate2 = { workspace = true }
zstd = { workspace = true }

# Concurrency
parking_lot = { workspace = true }
crossbeam = { workspace = true }
crossbeam-channel = { workspace = true }

# Hashing
ahash = { workspace = true }

# Serialization
rmp-serde = "1.3"

# Utilities
lru = { workspace = true }
num-traits = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }
proptest = { workspace = true }
criterion = { workspace = true }

[lints]
workspace = true
