[package]
name = "oxigdal-proj"
description = "Pure Rust coordinate transformation and projection support for OxiGDAL - EPSG database and CRS operations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-proj"
readme = "README.md"
keywords = ["gdal", "projection", "crs", "coordinate", "transform"]
categories = ["science", "algorithms"]

[features]
default = ["std"]
std = ["thiserror/std", "serde/std", "dep:serde_json", "dep:once_cell", "dep:proj4rs"]
proj-sys = ["dep:proj"]  # Optional C bindings to PROJ library

[dependencies]
thiserror = { workspace = true }
serde = { workspace = true }
num-traits = { workspace = true }

# std-only dependencies
serde_json = { workspace = true, optional = true }
once_cell = { workspace = true, optional = true }

# Pure Rust projection implementation (std only — proj4rs requires std)
proj4rs = { version = "0.1.10", optional = true }

# Optional C bindings to PROJ library
proj = { version = "0.31", optional = true }

[dev-dependencies]
approx = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true
