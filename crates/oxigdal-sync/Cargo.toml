[package]
name = "oxigdal-sync"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-sync"
readme = "README.md"
description = "Multi-device synchronization with CRDTs, vector clocks, and operational transformation for OxiGDAL"
keywords = ["science", "sync", "crdt", "distributed", "collaboration"]
categories = ["science", "data-structures", "network-programming"]

[dependencies]
# Core dependencies
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Async runtime
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Data structures
bytes = { workspace = true }
byteorder = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }

# Serialization
blake3 = { workspace = true }

# Logging
tracing = { workspace = true }

# Time
chrono = { workspace = true }

# Additional utilities
num-traits = { workspace = true }
ahash = { workspace = true }
crossbeam = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
criterion = { workspace = true }
proptest = { workspace = true }

[features]
default = []

[lib]
doctest = false

[[bench]]
name = "sync_bench"
harness = false
