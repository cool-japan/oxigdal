# cbindgen configuration for OxiGDAL Mobile SDK
# Generates C header files for FFI bindings

language = "C"
header = """
/*
 * OxiGDAL Mobile SDK - C Header
 * Copyright (c) 2026 COOLJAPAN OU (Team Kitasan)
 * Licensed under Apache-2.0
 *
 * This file is auto-generated by cbindgen.
 * Do not modify manually - regenerate using: cbindgen --config cbindgen.toml --output oxigdal_mobile.h
 */
"""
include_guard = "OXIGDAL_MOBILE_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify manually. */"
pragma_once = true
include_version = true

# Output configuration
style = "both"
usize_is_size_t = true
tab_width = 4
line_length = 100
documentation = true
documentation_style = "doxy"

# Namespace configuration
namespace = "oxigdal"

# Type configuration
[defines]
"target_os = ios" = "OXIGDAL_IOS"
"target_os = android" = "OXIGDAL_ANDROID"

# Export configuration
[export]
include = [
    "OxiGdalErrorCode",
    "OxiGdalDataset",
    "OxiGdalBand",
    "OxiGdalLayer",
    "OxiGdalFeature",
    "OxiGdalTile",
    "OxiGdalMetadata",
    "OxiGdalBbox",
    "OxiGdalPoint",
    "OxiGdalTileCoord",
    "OxiGdalBuffer",
    "OxiGdalEnhanceParams",
    "OxiGdalVersion",
    "OxiGdalStats",
    "OxiGdalResampling",
    "OxiGdalDataType",
    "OxiGdalFilterType",
    "OxiGdalCompression",
]
prefix = "Oxi"
item_types = ["enums", "structs", "typedefs", "functions"]

# Function configuration
[export.rename]

# Enum configuration
[enum]
rename_variants = "ScreamingSnakeCase"
must_use = "Warn"

# Struct configuration
[struct]
derive_eq = true
derive_neq = true

# Macro configuration
[macro_expansion]
bitflags = true

# Parse configuration
[parse]
parse_deps = false
include = []
exclude = []
expand = ["oxigdal-mobile"]

[parse.expand.features]
std = ["std"]
ios = ["std", "ios"]
android = ["std", "android"]
