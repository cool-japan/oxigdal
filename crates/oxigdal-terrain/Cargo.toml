[package]
name = "oxigdal-terrain"
description = "Advanced terrain analysis and DEM processing for OxiGDAL - Derivatives, hydrology, viewshed, and geomorphometry"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-terrain"
readme = "README.md"
keywords = ["gdal", "science", "gis", "terrain", "dem"]
categories = ["science", "algorithms", "graphics"]

[features]
default = ["std", "derivatives", "hydrology"]
std = ["thiserror/std", "serde/std"]
parallel = ["dep:rayon"]
derivatives = []
hydrology = []
visibility = []
geomorphometry = []
all_features = ["derivatives", "hydrology", "visibility", "geomorphometry", "parallel"]

[dependencies]
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
num-traits = { workspace = true }
tracing = { workspace = true }

# Scientific computing - Use SciRS2 ecosystem
# Note: scirs2-core includes ndarray 0.17.1 as required dependency
scirs2-core = { version = "0.2.0", features = ["array", "array_stats", "linalg"] }

# Parallelization
rayon = { workspace = true, optional = true }

# Statistical operations
approx = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
criterion = { workspace = true }
approx = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "terrain_bench"
harness = false

[lints]
workspace = true
