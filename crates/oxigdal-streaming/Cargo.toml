[package]
name = "oxigdal-streaming"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-streaming"
readme = "README.md"
description = "Real-time data processing and streaming pipelines for OxiGDAL"
keywords = ["science", "streaming", "real-time", "pipelines", "gis"]
categories = ["science", "asynchronous", "data-structures"]

[dependencies]
# Core dependencies (always available)
oxigdal-core = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
oxicode = { workspace = true }

# std-only dependencies
serde_json = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
arrow = { workspace = true, optional = true }
arrow-array = { workspace = true, optional = true }
arrow-schema = { workspace = true, optional = true }
arrow-buffer = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }
crossbeam = { workspace = true, optional = true }
crossbeam-channel = { workspace = true, optional = true }
dashmap = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
num-traits = { workspace = true, optional = true }
byteorder = { workspace = true, optional = true }
ahash = { workspace = true, optional = true }

# State backend (RocksDB) - C FFI, feature-gated
rocksdb = { version = "0.24", default-features = false, features = ["snappy"], optional = true }

[dev-dependencies]
tokio = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
criterion = { workspace = true }
proptest = { workspace = true }
approx = { workspace = true }

[features]
default = ["std"]
std = [
    "oxigdal-core/std",
    "thiserror/std",
    "serde/std",
    "dep:serde_json",
    "dep:tokio",
    "dep:futures",
    "dep:async-trait",
    "dep:arrow",
    "dep:arrow-array",
    "dep:arrow-schema",
    "dep:arrow-buffer",
    "dep:chrono",
    "dep:parking_lot",
    "dep:crossbeam",
    "dep:crossbeam-channel",
    "dep:dashmap",
    "dep:tracing",
    "dep:bytes",
    "dep:ahash",
    "dep:byteorder",
    "dep:num-traits",
]
rocksdb-backend = ["dep:rocksdb"]

[lib]
doctest = false

[[bench]]
name = "streaming_bench"
harness = false
