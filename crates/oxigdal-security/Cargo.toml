[package]
name = "oxigdal-security"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/oxigdal-security"
rust-version.workspace = true
readme = "README.md"
keywords = ["security", "encryption", "access-control", "compliance", "audit"]
categories = ["cryptography", "authentication", "science"]
description = "Enterprise security features for OxiGDAL: encryption, access control, compliance"

[dependencies]
# Crypto primitives
ring = "0.17"
rustls = "0.23"
argon2 = "0.5"
sha2.workspace = true
aes-gcm = "0.10"
chacha20poly1305 = "0.10"

# UUID and time
uuid = { workspace = true }
chrono = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Data structures
dashmap.workspace = true
petgraph.workspace = true

# Compression
oxiarc-zstd = { workspace = true }

# Random — use scirs2-core for RNG (SciRS2 Policy: no direct rand/rand_distr)
scirs2-core = { workspace = true, features = ["random"] }
getrandom = "0.4"

# Encoding
base64.workspace = true

# Pattern matching
regex = "1"

# TLS support
webpki-roots = "1.0"
rustls-pemfile = "2"

# Concurrency
parking_lot.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
criterion = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "security_bench"
harness = false

[lib]
doctest = false
